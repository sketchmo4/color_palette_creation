<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Color Palette Creation</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; max-width: 820px; }
      label { display:block; margin-top: 14px; font-weight: 600; }
      input[type=text] { width: 100%; padding: 10px; font-size: 16px; }
      input[type=file] { width: 100%; padding: 8px; }
      button { margin-top: 18px; padding: 12px 16px; font-size: 16px; }
      .hint { color: #555; font-size: 14px; margin-top: 6px; }
      .row { margin-top: 10px; }
      pre { background: #111; color: #eee; padding: 12px; overflow:auto; }
    </style>
  </head>
  <body>
    <h1>Palette Input</h1>
    <div class="hint">Uploads two images into the watcher input folder. If Base name is blank, an auto name is used.</div>

    <form id="f" action="/upload" method="post" enctype="multipart/form-data">
      <label>Base name (optional)</label>
      <input type="text" name="base" placeholder="e.g. ketevan" />
      <div class="hint">Allowed: letters, numbers, _ and - (max 64 chars)</div>

      <label>Original image</label>
      <input type="file" name="original" accept="image/*" required />

      <label>Marked image (same scene with markups)</label>
      <input type="file" name="marked" accept="image/*" required />

      <button type="submit">Upload</button>
    </form>

    <div class="row">
      <a href="/runs">Browse runs</a>
    </div>

    <h3>Folders</h3>
    <div class="hint">Input: {{ in_dir }} | Output: {{ out_dir }}</div>
  </body>
</html>
