<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Runs</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; max-width: 820px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align:left; }
      a { text-decoration: none; }
    </style>
  </head>
  <body>
    <h1>Processed bases</h1>
    <div><a href="/">← Back</a></div>
    <table>
      <thead>
        <tr><th>Base</th><th>Report</th><th>Last modified</th></tr>
      </thead>
      <tbody>
        {% for b in bases %}
          <tr>
            <td>{{ b.base }}</td>
            <td>
              {% if b.pdf %}
                <a href="/runs/{{ b.base }}/pdf">{{ b.pdf }}</a>
              {% else %}
                (not ready)
              {% endif %}
            </td>
            <td>{{ b.mtime | int }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
