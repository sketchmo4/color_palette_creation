<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Paints</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 24px; max-width: 920px; }
      table { border-collapse: collapse; width: 100%; margin-top: 12px; }
      th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align:left; }
      input[type=text] { width: 100%; padding: 8px; }
      .sw { width: 44px; height: 22px; border:1px solid #bbb; border-radius: 6px; }
      button { padding: 8px 10px; }
      .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
      .hint { color:#555; font-size:14px; }
    </style>
  </head>
  <body>
    <h1>Paint palette</h1>
    <div class="row">
      <a href="/">← Upload</a>
      <a href="/runs">Runs</a>
    </div>
    <div class="hint" style="margin-top:8px;">Config: {{ config_path }}</div>

    <form method="post" action="/paints" id="paintForm">
      <table id="t">
        <thead>
          <tr>
            <th style="width:34px;">On</th>
            <th>Paint name</th>
            <th style="width:140px;">Hex</th>
            <th style="width:70px;">Swatch</th>
            <th style="width:120px;">Order</th>
          </tr>
        </thead>
        <tbody>
          {% for name, hexv in paint_items %}
          <tr>
            <td>
              <input type="checkbox" name="enabled" value="{{ name }}" {% if enabled.get(name, true) %}checked{% endif %} />
            </td>
            <td><input type="text" name="name" value="{{ name }}" /></td>
            <td><input type="text" name="hexv" value="{{ hexv }}" /></td>
            <td><div class="sw" style="background: {{ hexv }};"></div></td>
            <td>
              <button type="button" onclick="moveRow(this, -1)">↑</button>
              <button type="button" onclick="moveRow(this, 1)">↓</button>
              <button type="button" onclick="deleteRow(this)">Delete</button>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>

      <div class="row" style="margin-top:14px;">
        <button type="button" onclick="addRow()">Add paint</button>
        <button type="submit">Save</button>
      </div>
      <div class="hint" style="margin-top:10px;">
        Notes: Hex must be like <code>#RRGGBB</code>. At least 2 paints required. Changes take effect the next time the worker reads config (restart worker if needed).
      </div>
    </form>

    <script>
      function moveRow(btn, dir) {
        const tr = btn.closest('tr');
        const tbody = tr.parentElement;
        const idx = Array.from(tbody.children).indexOf(tr);
        const newIdx = idx + dir;
        if (newIdx < 0 || newIdx >= tbody.children.length) return;
        tbody.insertBefore(tr, dir < 0 ? tbody.children[newIdx] : tbody.children[newIdx].nextSibling);
      }

      function deleteRow(btn) {
        const tr = btn.closest('tr');
        tr.remove();
      }

      function addRow() {
        const tbody = document.querySelector('#t tbody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><input type="checkbox" name="enabled" value="" checked /></td>
          <td><input type="text" name="name" value="" placeholder="Paint name" /></td>
          <td><input type="text" name="hexv" value="#FFFFFF" /></td>
          <td><div class="sw" style="background: #FFFFFF;"></div></td>
          <td>
            <button type="button" onclick="moveRow(this, -1)">↑</button>
            <button type="button" onclick="moveRow(this, 1)">↓</button>
            <button type="button" onclick="deleteRow(this)">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      }

      // Keep checkbox values in sync with the name field (so enabled set works after renames)
      document.getElementById('paintForm').addEventListener('input', (e) => {
        const tr = e.target.closest('tr');
        if (!tr) return;
        const nameInput = tr.querySelector('input[name="name"]');
        const check = tr.querySelector('input[type="checkbox"][name="enabled"]');
        const hexInput = tr.querySelector('input[name="hexv"]');
        const sw = tr.querySelector('.sw');
        if (nameInput && check) check.value = nameInput.value;
        if (hexInput && sw) sw.style.background = hexInput.value;
      });

      // initialize checkbox values
      document.querySelectorAll('#t tbody tr').forEach(tr => {
        const nameInput = tr.querySelector('input[name="name"]');
        const check = tr.querySelector('input[type="checkbox"][name="enabled"]');
        if (nameInput && check) check.value = nameInput.value;
      });
    </script>
  </body>
</html>
