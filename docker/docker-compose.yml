services:
  color_palette_creation_w_gui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: color_palette_creation_w_gui
    restart: unless-stopped
    environment:
      - CONFIG_PATH=/config/color_palette_config.ini
    volumes:
      # Incoming pairs
      - ${INCOMING_DIR:-./data/incoming}:/mnt/in
      # Processed outputs (per-base folders)
      - ${PROCESSED_DIR:-./data/processed}:/mnt/out
      # Archive of processed inputs
      - ${ARCHIVE_DIR:-./data/archive}:/mnt/archive
      # Config (must be a FILE, not a directory)
      - ${CONFIG_FILE:-./data/color_palette_config.ini}:/config/color_palette_config.ini:ro
      # Optional rclone config (contains tokens; do not commit). Only required if [drive].enabled=true
      - ${RCLONE_CONFIG:-./data/rclone.conf}:/root/.config/rclone/rclone.conf:ro

  color_palette_creation_w_gui_ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    container_name: color_palette_creation_w_gui_ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-4040}:4040"
    environment:
      - CONFIG_PATH=/config/color_palette_config.ini
    volumes:
      - ${INCOMING_DIR:-./data/incoming}:/mnt/in
      - ${PROCESSED_DIR:-./data/processed}:/mnt/out
      - ${CONFIG_FILE:-./data/color_palette_config.ini}:/config/color_palette_config.ini:ro

  palette_telegram_bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.telegram_bot
    container_name: palette_telegram_bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - IN_DIR=/mnt/in
      - OUT_DIR=/mnt/out
      - STATE_PATH=/data/state.json
    volumes:
      - ${INCOMING_DIR:-./data/incoming}:/mnt/in
      - ${PROCESSED_DIR:-./data/processed}:/mnt/out
      - ${BOT_DATA_DIR:-./data/bot}:/data
