services:
  color_palette_creation:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: color_palette_creation
    restart: unless-stopped
    environment:
      - CONFIG_PATH=/config/color_palette_config.ini
    volumes:
      # Incoming pairs
      - /mnt/nas2/Color_Palette_Creation/incoming:/mnt/in
      # Processed outputs (per-base folders)
      - /mnt/nas2/Color_Palette_Creation/processed:/mnt/out
      # Archive of processed inputs
      - /mnt/nas2/Color_Palette_Creation/archive:/mnt/archive
      # Config (must be a FILE, not a directory)
      - /mnt/nas2/Color_Palette_Creation/color_palette_config.ini:/config/color_palette_config.ini:ro
      # rclone config (contains tokens; keep private on host)
      - /home/brett/.config/rclone/rclone.conf:/root/.config/rclone/rclone.conf:ro

  palette_ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    container_name: palette_ui
    restart: unless-stopped
    ports:
      - "4040:4040"
    volumes:
      - /mnt/nas2/Color_Palette_Creation/incoming:/mnt/in
      - /mnt/nas2/Color_Palette_Creation/processed:/mnt/out
